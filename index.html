<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asistencia — Semana de Integracion 2026 - Plaza Pueyrredón</title>
<style>
  /* ========= THEME (paleta luminosa basada en rgb(0,82,87)) ========= */
  :root{
    --brand-700: rgb(0,82,87);     /* principal */
    --brand-600: #0a6b70;          /* hover sólido */
    --brand-500: #118a91;          /* acento visible */
    --brand-100: #e6f6f7;          /* fondo suave */
    --mint-100:  #e8fbf1;          /* éxito muy suave */
    --mint-600:  #1f8a5b;          /* éxito */
    --amber-100: #fff7e6;          /* aviso suave */
    --amber-700: #995f00;          /* aviso */
    --rose-100:  #ffe8e8;          /* error suave */
    --rose-700:  #a40000;          /* error */
    --ink-900:   #0d1b1c;          /* texto primario */
    --ink-700:   #2a3f41;          /* texto secundario */
    --ink-500:   #587476;          /* texto tenue */
    --white:     #ffffff;

    /* efectos */
    --card-bg:   rgba(255,255,255,.85);
    --card-brd:  rgba(0,82,87,.15);
    --ring:      rgba(0,82,87,.35);
    --shadow:    0 10px 30px rgba(0, 82, 87, .15);
    --radius:    16px;
    --radius-sm: 10px;
    --speed:     .18s;
  }

  /* ========= RESETEO & BASE ========= */
  *, *::before, *::after{ box-sizing:border-box }
  html, body{ height:100% }
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--ink-900);
    background:
      radial-gradient(1400px 800px at 10% -10%, #bbf2f5 0%, transparent 60%) no-repeat,
      radial-gradient(1200px 700px at 100% 0%, #c7fff0 0%, transparent 55%) no-repeat,
      linear-gradient(180deg, var(--brand-100), #f7fffe 60%);
  }

  a{ color:var(--brand-600); text-decoration:none }
  a:hover{ text-decoration:underline }

  /* ========= LAYOUT ========= */
  header{
    max-width: 980px;
    margin: 24px auto 0;
    padding: 0 16px;
  }
  .brand{
    display:flex; align-items:center; gap:12px;
    color:var(--brand-700);
    font-weight:800; letter-spacing:.2px;
  }
  .brand .dot{
    width:14px; height:14px; border-radius:50%;
    background: var(--brand-700);
    box-shadow: 0 0 0 6px rgba(0,82,87,.12), 0 6px 18px rgba(0,82,87,.25);
  }

  main{
    display:grid;
    place-items:center;
    padding: 12px 16px 48px;
  }

  /* ========= CARD (antes .card) ========= */
  .card{
    width:100%;
    max-width: 720px;
    padding: 20px;
    border-radius: var(--radius);
    background: var(--card-bg);
    backdrop-filter: blur(8px);
    border: 1px solid var(--card-brd);
    box-shadow: var(--shadow);
  }

  .card h2{
    margin: 6px 0 14px;
    text-align:center;
    line-height:1.2;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 800;
    color: var(--brand-700); /* ← antes era var(--white) */
    text-shadow: 0 1px 3px rgba(0,0,0,.2); /* leve contraste para legibilidad */
  }

  .sub{
    margin:-4px 0 12px;
    text-align:center;
    font-size: 13px;
    color: var(--ink-500);
  }

  /* ========= FORM ========= */
  label{
    display:block;
    margin-top:12px;
    font-weight:700;
    font-size:14px;
    color:var(--ink-700);
  }

  input, select, button{
    width:100%;
    margin-top:6px;
    padding: 12px 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,.08);
    background: var(--white);
    outline: none;
    transition: border var(--speed) ease, box-shadow var(--speed) ease, transform var(--speed) ease;
    font-size:16px;
  }

  input::placeholder{ color:#9bb3b5 }

  input:focus-visible, select:focus-visible{
    border-color: var(--brand-500);
    box-shadow: 0 0 0 4px var(--ring);
  }

  .row{
    display:flex; gap:12px; flex-wrap:wrap;
  }
  .row > div{ flex:1; min-width: 220px; }

  /* ========= HINTS / STATUS ========= */
  .hint{
    background: var(--brand-100);
    padding: 10px 12px;
    border-radius: 12px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--ink-700);
    border: 1px dashed rgba(0,82,87,.25);
  }
  .hint.ok{ background: var(--mint-100); color: var(--mint-600); border-color: rgba(31,138,91,.25) }
  .hint.warn{ background: var(--amber-100); color: var(--amber-700); border-color: rgba(153,95,0,.25) }
  .hint.err{ background: var(--rose-100); color: var(--rose-700); border-color: rgba(164,0,0,.25) }

  .diag{
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; white-space: pre-wrap;
    border: 1px dashed rgba(0,0,0,.15);
    padding: 10px; border-radius: 12px; margin-top: 10px;
    background: #fcfefe;
    color: #355154;
  }

  /* ========= BUTTONS ========= */
  .actions{ display:grid; grid-template-columns: 1fr; gap:10px; margin-top: 12px;}
  button{
    font-weight:800; letter-spacing:.2px; cursor:pointer;
    color:#fff;
    background: linear-gradient(180deg, var(--brand-500), var(--brand-700));
    border: 1px solid rgba(0,82,87,.4);
  }
  button:hover{ transform: translateY(-1px) }
  button:active{ transform: translateY(0) scale(.995) }
  button[disabled]{ opacity:.6; cursor:not-allowed; transform:none }

  #ask{
    background: linear-gradient(180deg, #2fb6bd, var(--brand-600));
  }
  #btn{
    background: linear-gradient(180deg, var(--brand-500), var(--brand-700));
  }

  #msg{
    margin: 6px 2px 0;
    font-weight:700;
    font-size: 14px;
  }
  #msg.ok{ color: var(--mint-600) }
  #msg.warn{ color: var(--amber-700) }
  #msg.err{ color: var(--rose-700) }

  /* ========= FOOTER ========= */
  footer{
    max-width:980px; margin: 18px auto 40px; padding:0 16px;
    text-align:center; font-size:12px; color:var(--ink-500);
  }

  /* ========= DARK AUTO (opcional, mantiene luminancia) ========= */
  @media (prefers-color-scheme: dark){
    :root{
      --card-bg: rgba(255,255,255,.10);
      --card-brd: rgba(255,255,255,.18);
      --ring: rgba(47, 182, 189, .45);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --white: rgba(255,255,255,.9);
      --ink-900:#e9f5f6; --ink-700:#cfe5e7; --ink-500:#b7d3d6;
    }
    body{
      background:
        radial-gradient(1400px 800px at 10% -10%, rgba(0,170,160,.25) 0%, transparent 60%),
        radial-gradient(1200px 700px at 100% 0%, rgba(0,255,200,.12) 0%, transparent 55%),
        linear-gradient(180deg, #021a1b, #062526 60%);
    }
    .diag{ background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.15); color:#d4eff0 }
  }
</style>
</head>

<body>
  <header>
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <div>Facultad de Medicina · UNMdP</div>
    </div>
  </header>

  <main>
    <section class="card" aria-label="Registro de asistencia">
      <h2>Registro de Asistencia — Semana de Integración 2026</h2>
      <p class="sub">Geo-validación Plaza Pueyrredon</p>

      <div id="diag" class="diag">Diagnóstico inicial…</div>

      <label for="materia">Materia</label>
      <select id="materia"></select>

      <div class="row">
        <div>
          <label for="legajo">Legajo</label>
          <input id="legajo" placeholder="12345" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div>
          <label for="nombre">Nombre y Apellido</label>
          <input id="nombre" placeholder="Ana Pérez" autocomplete="off">
        </div>
      </div>

      <label for="comision">Comisión</label>
      <input id="comision" placeholder="Ej: 1, 2, 3…" inputmode="numeric" pattern="[0-9]*" autocomplete="off">

      <div id="geo" class="hint">1) Tocá “Activar ubicación”.</div>

      <div class="actions">
        <button id="ask" type="button">Activar ubicación</button>
        <button id="btn" type="button" disabled>Registrar asistencia</button>
      </div>

      <p id="msg" class=""></p>
    </section>
  </main>

  <footer>
    © Medicina UNMdP
  </footer>

  <!-- ===== JS ORIGINAL (sin cambios funcionales) ===== -->
  <script>
  /* ====== CONFIG ====== */
  const API = "https://script.google.com/macros/s/AKfycbzKsPT5WBqk3WUGjYzshDzCmsr5xz3LnOz8-8Okki6sdkfximUE1qNpfr8xtG8UkC0/exec";
  const MATERIAS_FALLBACK = [
    {id:"SANNA", nombre:"SANNA"},
    {id:"MICC1", nombre:"MICC 1"}
  ];

  /* ====== UI refs ====== */
  const diag = document.getElementById('diag');
  const sel  = document.getElementById('materia');
  const geo  = document.getElementById('geo');
  const ask  = document.getElementById('ask');
  const btn  = document.getElementById('btn');
  const msg  = document.getElementById('msg');

  const params = new URLSearchParams(location.search);
  const pre    = params.get('materiaId');

  let coords = null;
  let materias = [];
  let cfg = null;
  let publicIP = null;

  /* ====== helpers ====== */
  function logd(line){ diag.textContent += "\n" + line; }
  function haversine(lat1, lon1, lat2, lon2){
    const R=6371000, toRad=x=>x*Math.PI/180;
    const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
    const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }
  /* JSONP helper */
  function jsonp(url){
    return new Promise((resolve, reject)=>{
      const cb = '__cb_' + Math.random().toString(36).slice(2);
      const cleanup = () => { delete window[cb]; if (script && script.parentNode) script.parentNode.removeChild(script); };
      window[cb] = (data) => { cleanup(); resolve(data); };
      const script = document.createElement('script');
      script.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
      script.onerror = () => { cleanup(); reject(new Error('JSONP load error')); };
      document.head.appendChild(script);
    });
  }

  /* ====== IP pública (robusto con timeouts y fallbacks) ====== */
  async function getPublicIP(timeoutMs = 2500) {
    const withTimeout = (p, ms) =>
      Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))]);

    const providers = [
      async () => {
        const r = await withTimeout(fetch('https://api.ipify.org?format=json'), timeoutMs);
        if (!r.ok) throw new Error('ipify failed');
        const { ip } = await r.json();
        return ip;
      },
      async () => {
        const r = await withTimeout(fetch('https://www.cloudflare.com/cdn-cgi/trace'), timeoutMs);
        if (!r.ok) throw new Error('cloudflare failed');
        const txt = await r.text();
        const m = txt.match(/ip=([^\n]+)/);
        if (!m) throw new Error('cloudflare parse');
        return m[1];
      },
      async () => {
        const r = await withTimeout(fetch('https://ipapi.co/json/'), timeoutMs);
        if (!r.ok) throw new Error('ipapi failed');
        const { ip } = await r.json();
        if (!ip) throw new Error('ipapi parse');
        return ip;
      }
    ];

    for (const p of providers) {
      try { return await p(); } catch (_) { /* probar siguiente */ }
    }
    return null;
  }

  /* ====== Diagnóstico ====== */
  async function ping(){
    try{
      const r = await fetch(API + '?ping=1');
      const t = await r.text();
      logd("Ping: " + r.status + " -> " + t);
    }catch(e){
      logd("Ping ERROR: " + e);
    }
  }
  async function loadConfig(){
    try{
      const r = await fetch(API + '?action=config');
      if (!r.ok) throw new Error("HTTP "+r.status);
      cfg = await r.json();
      logd("Config OK: radius="+cfg.radiusMeters+" center=("+cfg.centerLat+","+cfg.centerLng+")");
    }catch(e){
      cfg = null; logd("Config FALLÓ: " + e);
    }
  }
  async function loadMaterias(){
    try{
      const r = await fetch(API + '?action=materias');
      if (!r.ok) throw new Error("HTTP "+r.status);
      const arr = await r.json();
      materias = Array.isArray(arr)&&arr.length ? arr : MATERIAS_FALLBACK.slice();
      logd("Materias OK: " + materias.length);
    }catch(e){
      materias = MATERIAS_FALLBACK.slice();
      logd("Materias FALLÓ, usando fallback ("+materias.length+"): " + e);
    }
    sel.innerHTML='';
    materias.forEach(m=>{
      const o=document.createElement('option');
      o.value=m.id; o.textContent=`${m.id} — ${m.nombre}`;
      sel.appendChild(o);
    });
    if (pre && materias.find(m=>m.id===pre)) sel.value=pre;
  }

  /* ====== Geolocalización ====== */
  ask.onclick = () => {
    if (!('geolocation' in navigator)) {
      geo.textContent='Tu navegador no soporta geolocalización.'; geo.className='hint err'; return;
    }
    navigator.geolocation.getCurrentPosition(
      p => {
        coords = { lat:p.coords.latitude, lng:p.coords.longitude, accuracy:p.coords.accuracy };
        if (cfg && typeof cfg.centerLat==='number' && typeof cfg.centerLng==='number') {
          const dist = haversine(cfg.centerLat, cfg.centerLng, coords.lat, coords.lng);
          const eff  = Math.max(0, dist - (coords.accuracy||0));
          const rad  = cfg.radiusMeters || 150;
          geo.textContent = `Ubicación OK (±${Math.round(coords.accuracy)} m). Distancia≈ ${Math.round(dist)} m (efectiva≈ ${Math.round(eff)} m) — Radio ${rad} m.`;
        } else {
          geo.textContent = `Ubicación OK (±${Math.round(coords.accuracy)} m).`;
        }
        geo.className='hint ok';
        btn.disabled=false;
      },
      e => {
        geo.textContent = 'No pudimos obtener ubicación: ' + e.message +
          '. En iPhone: Ajustes → Privacidad → Localización → Safari → “Mientras se usa” + “Ubicación precisa”.';
        geo.className='hint err';
        btn.disabled=true;
      },
      { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
  };

  /* ====== Envío SIN CORS (JSONP GET) ====== */
  btn.onclick = async () => {
    const legajo = document.getElementById('legajo').value.trim();
    const nombre = document.getElementById('nombre').value.trim();
    const comision = document.getElementById('comision').value.trim();
    const materiaId = sel.value;
    const materiaNombre = (materias.find(m=>m.id===materiaId)||{}).nombre || '';

    if (!coords) { msg.textContent='Activá la ubicación primero.'; msg.className='warn'; return; }
    if (!legajo || !nombre || !materiaId || !comision) {
      msg.textContent='Completá todos los campos.'; msg.className='warn'; return;
    }

    try{
      btn.disabled=true; btn.textContent='Registrando…';

      const payload = encodeURIComponent(JSON.stringify({
        materiaId, materiaNombre, legajo, nombre, comision,
        lat:coords.lat, lng:coords.lng, accuracy:coords.accuracy,
        userAgent:navigator.userAgent,
        ip: publicIP || null
      }));

      const url = `${API}?action=reg&payload=${payload}`;
      const j = await jsonp(url);

      msg.textContent = j.duplicate ? j.message :
        `${j.message} [${j.estado}]` +
        (j.distancia_m!=null ? ` — dist=${j.distancia_m}m, acc=±${j.accuracy_m}m, eff=${j.distancia_efectiva_m}m / radio=${j.radius_m}m` : '');
      msg.className = j.ok ? 'ok' : 'warn';
    }catch(err){
      msg.textContent = 'Error de red: ' + err;
      msg.className = 'err';
      logd("REG JSONP ERROR: " + err);
    }finally{
      btn.disabled=false; btn.textContent='Registrar asistencia';
    }
  };

  /* init */
  (async function(){
    diag.textContent = "Diagnóstico inicial:";
    await ping();
    await loadConfig();
    await loadMaterias();

    try {
      publicIP = await getPublicIP();
      logd("IP: " + (publicIP || "no disponible"));
    } catch(e) {
      publicIP = null;
      logd("IP FALLÓ: " + e);
    }
  })();
  </script>
</body>
</html>
